<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Koubou Labs Logo — Option A Preview</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>:root{--bg:#F2EAD3;--text:#2C2420;--muted:#6B6259;--accent:#C4654A}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:64px 24px}.wrap{max-width:960px;margin:0 auto}.card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:48px;text-align:center}.kanji{font-family:serif;font-size:72px;line-height:1;color:var(--accent)}.wordmark{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:500;line-height:1.05;margin-top:10px;letter-spacing:-.01em}.note{margin-top:22px;color:var(--muted);font-size:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px}.mini{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:28px;text-align:center}.mini .wordmark{font-size:34px}.badge{display:inline-block;background:var(--accent);color:#fff;border-radius:3px;padding:10px 14px;font-family:serif;font-size:24px;line-height:1}.label{margin-top:10px;font-size:12px;color:var(--muted)}@media(max-width:700px){.row{grid-template-columns:1fr}.wordmark{font-size:42px}}</style></head><body><div class="wrap"><div class="card"><div class="kanji">工</div><div class="wordmark">Koubou Labs</div><div class="note">Option A: Cormorant Garamond + original 工 (no extra stylization)</div></div><div class="row"><div class="mini"><div class="badge">工</div><div class="label">Favicon / icon (sharper corners)</div></div><div class="mini"><div class="kanji" style="font-size:38px">工</div><div class="wordmark">Koubou Labs</div><div class="label">Header lockup</div></div></div></div></body></html>
